<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="bgGlow" cx="20%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#021112"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="100%" stop-color="#021a1a"/>
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="textAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGlow)"/>

  <!-- Decorative dots grid -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#34d399"/>
    </pattern>
    <rect width="1280" height="640" fill="url(#dots)"/>
  </g>

  <!-- Subtle accent line top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#textAccent)"/>

  <!-- Icon: notfallplan cross in rings -->
  <circle cx="220" cy="315" r="140" fill="#ffffff" stroke="url(#ringGrad)" stroke-width="20"/>
  <rect x="136" y="279" width="168" height="72" rx="12" fill="url(#crossGrad)"/>
  <rect x="184" y="231" width="72" height="168" rx="12" fill="url(#crossGrad)"/>

  <!-- Title -->
  <text x="440" y="293" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" fill="#f1f5f9" letter-spacing="-2">Mein Notfallplan</text>

  <!-- Subtitle -->
  <text x="440" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#94a3b8" letter-spacing="-0.5">privat • offline • für dich</text>

  <!-- Decorative line under text -->
  <rect x="440" y="380" width="80" height="4" rx="2" fill="url(#textAccent)" opacity="0.7"/>

  <!-- Bottom right domain -->
  <text x="1250" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#475569" text-anchor="end">notfallplan.jfsen.org</text>
</svg>
