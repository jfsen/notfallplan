<!doctype html>
<html lang="de">
    <head>
        <meta name="theme-color" content="#18181b" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Mein Notfallplan</title>
        <link
            rel="icon"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23ffffff'/%3E%3Crect x='20' y='38' width='60' height='24' rx='4' fill='%2334d399'/%3E%3Crect x='38' y='20' width='24' height='60' rx='4' fill='%2334d399'/%3E%3C/svg%3E"
            type="image/svg+xml"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Inter", system-ui, sans-serif;
                background: #18181b;
                color: #e4e4e7;
                line-height: 1.6;
                padding-bottom: 120px;
            }
            .container {
                max-width: 640px;
                margin: 0 auto;
                padding: 0 20px;
            }
            header {
                background: #18181b;
                border-bottom: 1px solid #3f3f46;
                position: sticky;
                top: 0;
                z-index: 50;
            }
            .header-content {
                padding: 12px 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            h1 {
                font-size: 2.1rem;
                font-weight: 700;
                letter-spacing: -0.04em;
                color: #34d399;
            }

            .manage-btn {
                background: #3f3f46;
                color: white;
                border: none;
                padding: 8px 14px;
                border-radius: 12px;
                font-size: 0.95rem;
                cursor: pointer;
            }

            .counter {
                background: #27272a;
                border: 1px solid #34d39940;
                border-radius: 16px;
                padding: 8px 20px;
                text-align: center;
                line-height: 1.2;
            }

            .fab {
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: #20956a;
                color: #ffffff;
                width: 64px;
                height: 64px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 28px;
                box-shadow: 0 10px 30px -10px rgba(52, 211, 153, 0.6);
                z-index: 100;
                border: none;
                cursor: pointer;
            }

            #editor-textarea {
                background: #18181b;
                border: 2px solid #34d399;
                border-radius: 16px;
                padding: 20px;
                color: #e4e4e7;
                font-family: inherit;
                font-size: 1.05rem;
                line-height: 1.7;
            }

            .modal-save-btn {
                padding: 12px 28px;
                background: #34d399;
                color: white;
                font-weight: 600;
                border: none;
                border-radius: 12px;
                font-size: 1.02rem;
                cursor: pointer;
            }

            .modal-save-btn:hover {
                background: #10b981;
                transform: scale(1.03);
            }

            .section {
                background: #27272a;
                border: 1px solid #3f3f46;
                border-radius: 24px;
                margin-bottom: 28px;
                overflow: hidden;
            }
            .section-header {
                background: linear-gradient(135deg, #10b981, #34d399);
                color: white;
                padding: 16px 24px;
                font-weight: 600;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .collapsible-section .section-header {
                cursor: pointer;
                user-select: none;
            }

            .collapsible-section .section-header:hover {
                filter: brightness(1.08);
            }

            .collapse-icon {
                font-size: 1.8rem;
                transition: transform 0.3s ease;
                margin-left: 8px;
            }

            .collapsible-section .section-header:hover .collapse-icon {
                transform: rotate(90deg);
                opacity: 0.9;
            }

            button {
                cursor: pointer;
            }

            .edit-btn {
                background: rgba(255, 255, 255, 0.25);
                border: none;
                color: white;
                width: 34px;
                height: 34px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                font-size: 18px;
                transition: all 0.2s;
                flex-shrink: 0;
            }

            .edit-btn:hover {
                background: rgba(255, 255, 255, 0.4);
                transform: scale(1.05);
            }
            .edit-btn.saving {
                background: #10b981;
            }

            .section-content {
                padding: 24px;
            }

            textarea {
                width: 100%;
                background: #18181b;
                border: 2px solid #34d399;
                border-radius: 16px;
                padding: 18px;
                color: #e4e4e7;
                font-family: inherit;
                font-size: 1rem;
                line-height: 1.65;
                min-height: 180px;
                resize: vertical;
            }

            .content-display {
                background: #18181b;
                border: 1px solid #52525b;
                border-radius: 16px;
                padding: 18px;
                min-height: 160px;
                white-space: pre-wrap;
                word-break: break-word;
            }

            .breathing-section {
                background: linear-gradient(
                    135deg,
                    rgba(16, 185, 129, 0.08),
                    rgba(45, 212, 191, 0.04)
                );
                margin-bottom: 24px;
                border: 1px solid rgba(52, 211, 153, 0.3);
                border-radius: 28px;
                padding: 40px 24px 8px;
                text-align: center;
                transition: all 0.5s ease;
            }

            .breathing-circle-btn {
                background: none;
                border: none;
                padding: 0;
                cursor: pointer;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            /* Aktiver Zustand */
            .breathing-section.active #breathing-btn-text {
                color: #10b981;
            }

            /* Text under the circle */
            #breathing-btn-text {
                transition: all 0.3s ease;
            }

            /* Intensiver Zustand (Einatmen + Halten) */
            .breathing-section.intense {
                background: linear-gradient(
                    135deg,
                    rgba(16, 185, 129, 0.28),
                    rgba(45, 212, 191, 0.18)
                ) !important;
            }

            /* The animated circle */
            .breathing-circle {
                width: 148px;
                height: 148px;
                border-radius: 50%;
                border: 7px solid rgba(52, 211, 153, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                transition: all 4s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 10px 40px -10px rgba(52, 211, 153, 0.4);
                background: rgba(255, 255, 255, 0.06);
            }

            .breathing-circle::after {
                content: "";
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(52, 211, 153, 0.25) 20%,
                    transparent 70%
                );
                animation: pulse 4s infinite ease-in-out;
            }

            .breathing-circle::before {
                content: "";
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background: radial-gradient(
                    circle,
                    rgba(52, 211, 153, 0.25) 0%,
                    transparent 70%
                );
                animation: pulse 4s infinite ease-in-out;
            }

            .breathing-circle.in {
                transform: scale(1.18);
                border-color: #34d399;
                box-shadow: 0 15px 50px -5px rgba(52, 211, 153, 0.6);
            }

            .breathing-circle.out {
                transform: scale(0.82);
                border-color: rgba(52, 211, 153, 0.35);
            }

            .breathing-btn {
                width: 100%;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid #34d39930;
                color: white;
                font-size: 1.35rem;
                font-weight: 500;
                padding: 28px 20px;
                border-radius: 20px;
                cursor: pointer;
            }

            .contact-item {
                background: #18181b;
                border: 1px solid #3f3f46;
                border-radius: 16px;
                padding: 16px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 12px;
                transition: all 0.2s ease;
            }

            .contact-item.dragging {
                opacity: 0.4;
                transform: scale(0.98);
            }

            .contact-item span[style*="cursor:grab"] {
                user-select: none;
            }

            .add-contact {
                width: 100%;
                padding: 14px;
                background: #3f3f46;
                border: none;
                border-radius: 16px;
                color: white;
                font-weight: 500;
                cursor: pointer;
            }

            .contact-call-btn {
                background: #34d399;
                color: white;
                width: 44px;
                height: 44px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: none;
                text-decoration: none;
            }

            .modal {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.85);
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 200;
            }

            .modal-content {
                background: #27272a;
                border-radius: 24px;
                width: 90%;
                max-width: 420px;
                max-height: 85vh;
                overflow-y: auto;
                padding: 24px;
            }

            .section-manage-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: #1e1e22;
                border-radius: 12px;
                margin-bottom: 8px;
                cursor: grab;
                user-select: none;
                transition: all 0.2s;
            }

            .section-manage-item:active {
                cursor: grabbing;
            }

            .section-manage-item:hover {
                background: #35353a;
            }

            .section-manage-item.dragging {
                opacity: 0.4;
                transform: scale(0.98);
            }

            .add-section-btn {
                width: 100%;
                padding: 16px;
                background: #3f3f46;
                border: 2px dashed #52525b;
                color: #a1a1aa;
                font-weight: 500;
                border-radius: 20px;
                cursor: pointer;
                margin: 20px 0 40px 0;
                transition: all 0.2s;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="header-content">
                    <div style="display: flex; align-items: center; gap: 16px">
                        <svg
                            width="64"
                            height="64"
                            viewBox="0 0 100 100"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <circle
                                cx="50"
                                cy="50"
                                r="46"
                                fill="#ffffff"
                                stroke="#18181b"
                                stroke-width="7"
                            ></circle>
                            <rect
                                x="22"
                                y="38"
                                width="56"
                                height="24"
                                rx="4"
                                fill="#34d399"
                            ></rect>
                            <rect
                                x="38"
                                y="22"
                                width="24"
                                height="56"
                                rx="4"
                                fill="#34d399"
                            ></rect>
                        </svg>
                        <h1>Mein Notfallplan</h1>
                    </div>

                    <div id="counter-wrapper" style="display: none">
                        <div class="counter">
                            <div
                                style="
                                    font-size: 0.75rem;
                                    letter-spacing: 1px;
                                    color: #34d399;
                                    font-weight: 500;
                                "
                            >
                                TAGE ABSTINENT
                            </div>
                            <div
                                id="days-count"
                                style="
                                    font-size: 2.2rem;
                                    font-weight: 700;
                                    color: white;
                                "
                            >
                                0
                            </div>
                            <div
                                style="
                                    display: flex;
                                    align-items: center;
                                    gap: 4px;
                                    justify-content: center;
                                "
                            >
                                <span style="font-size: 0.7rem; color: #888"
                                    >seit</span
                                >
                                <input
                                    type="date"
                                    id="start-date"
                                    class="date-input"
                                    onchange="updateStartDate(this.value)"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div style="display: flex; gap: 12px; margin: 28px 0 16px 0">
                <button
                    onclick="showManageModal()"
                    style="
                        flex: 1;
                        padding: 14px;
                        background: #3f3f46;
                        border: none;
                        border-radius: 16px;
                        color: white;
                        font-weight: 500;
                        font-size: 1.02rem;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        gap: 8px;
                    "
                >
                    <span id="icon-gear"></span>
                    Sektionen verwalten
                </button>

                <button
                    onclick="showAddSectionModal()"
                    style="
                        flex: 1;
                        padding: 14px;
                        background: #3f3f46;
                        border: none;
                        border-radius: 16px;
                        color: white;
                        font-weight: 600;
                        font-size: 1.02rem;
                    "
                >
                    + Neue Sektion
                </button>
            </div>

            <div id="main-content" style="margin-top: 32px"></div>
        </div>

        <button
            class="fab"
            onclick="exportCleanHTML()"
            title="Notfallplan exportieren"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="28"
                height="28"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
        </button>

        <!-- Manage Modal -->
        <div class="modal" id="manage-modal">
            <div
                class="modal-content"
                style="display: flex; flex-direction: column; max-height: 85vh"
            >
                <h3 style="margin-bottom: 20px; color: #34d399; flex-shrink: 0">
                    Sektionen verwalten
                </h3>

                <!-- Scrollbarer Bereich -->
                <div
                    id="manage-list"
                    style="
                        flex: 1;
                        overflow-y: auto;
                        padding-right: 8px;
                        margin-bottom: 20px;
                    "
                >
                    <!-- Hier kommen die Sektionen per JS rein -->
                </div>

                <!-- Fixierter Footer-Button -->
                <div
                    style="
                        flex-shrink: 0;
                        padding-top: 16px;
                        border-top: 1px solid #3f3f46;
                    "
                >
                    <button
                        onclick="hideManageModal()"
                        style="
                            width: 100%;
                            padding: 16px;
                            background: #34d399;
                            border: none;
                            border-radius: 16px;
                            color: white;
                            font-weight: 600;
                            font-size: 1.05rem;
                        "
                    >
                        Fertig
                    </button>
                </div>
            </div>
        </div>

        <!-- Custom Section Modal -->
        <div class="modal" id="custom-section-modal">
            <div class="modal-content">
                <h3 style="margin-bottom: 20px; color: #34d399">
                    Neue Sektion erstellen
                </h3>
                <input
                    type="text"
                    id="new-section-title"
                    placeholder="Titel der Sektion"
                    onkeypress="
                        if (event.key === 'Enter') createCustomSection();
                    "
                    style="
                        width: 100%;
                        padding: 14px;
                        margin-bottom: 16px;
                        background: #18181b;
                        border: 1px solid #52525b;
                        border-radius: 12px;
                        color: white;
                    "
                />

                <div style="margin-bottom: 20px">
                    <label
                        style="
                            display: block;
                            margin-bottom: 8px;
                            color: #a1a1aa;
                        "
                        >Icon auswählen:</label
                    >
                    <div
                        id="icon-picker"
                        style="
                            display: grid;
                            grid-template-columns: repeat(4, 1fr);
                            gap: 12px;
                        "
                    ></div>
                </div>

                <label
                    style="
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        margin-bottom: 24px;
                        cursor: pointer;
                    "
                >
                    <input type="checkbox" id="new-section-collapsible" />
                    <span>Als aufklappbare Sektion</span>
                </label>

                <div style="display: flex; gap: 12px">
                    <button
                        onclick="hideAddSectionModal()"
                        style="
                            flex: 1;
                            padding: 14px;
                            background: #3f3f46;
                            border: none;
                            border-radius: 12px;
                            color: white;
                        "
                    >
                        Abbrechen
                    </button>
                    <button
                        onclick="createCustomSection()"
                        style="
                            flex: 1;
                            padding: 14px;
                            background: #34d399;
                            border: none;
                            border-radius: 12px;
                            color: white;
                            font-weight: 600;
                        "
                    >
                        Erstellen
                    </button>
                </div>
            </div>
        </div>

        <!-- Editor Modal -->
        <div class="modal" id="editor-modal">
            <div class="modal-content" style="max-width: 560px; width: 95%">
                <div
                    style="
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-bottom: 20px;
                    "
                >
                    <h3 id="editor-title" style="margin: 0; color: #34d399">
                        Sektion bearbeiten
                    </h3>
                </div>

                <textarea id="editor-textarea" rows="12"></textarea>

                <div
                    style="
                        margin-top: 20px;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                    "
                >
                    <div
                        id="editor-status"
                        style="
                            font-size: 1.1rem;
                            font-weight: 500;
                            color: #34d399;
                        "
                    ></div>

                    <div
                        style="
                            display: flex;
                            justify-content: flex-end;
                            gap: 12px;
                        "
                    >
                        <button onclick="closeEditor()" class="modal-save-btn">
                            Fertig
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contact Modal -->
        <div class="modal" id="contact-modal">
            <div class="modal-content">
                <h3 style="margin-bottom: 16px; color: #34d399">
                    Neuen Kontakt hinzufügen
                </h3>
                <input
                    type="text"
                    id="modal-name"
                    placeholder="Name"
                    onkeypress="if (event.key === 'Enter') addContactConfirm();"
                    style="
                        width: 100%;
                        padding: 12px;
                        margin-bottom: 12px;
                        background: #18181b;
                        border: 1px solid #52525b;
                        border-radius: 12px;
                        color: white;
                    "
                />
                <input
                    type="tel"
                    id="modal-tel"
                    placeholder="Telefonnummer"
                    onkeypress="if (event.key === 'Enter') addContactConfirm();"
                    style="
                        width: 100%;
                        padding: 12px;
                        margin-bottom: 20px;
                        background: #18181b;
                        border: 1px solid #52525b;
                        border-radius: 12px;
                        color: white;
                    "
                />
                <div style="display: flex; gap: 12px">
                    <button
                        onclick="hideAddContactModal()"
                        style="
                            flex: 1;
                            padding: 12px;
                            background: #3f3f46;
                            border: none;
                            border-radius: 12px;
                            color: white;
                        "
                    >
                        Abbrechen
                    </button>
                    <button
                        onclick="addContactConfirm()"
                        style="
                            flex: 1;
                            padding: 12px;
                            background: #34d399;
                            border: none;
                            border-radius: 12px;
                            color: white;
                            font-weight: 600;
                        "
                    >
                        Hinzufügen
                    </button>
                </div>
            </div>
        </div>

        <script>
            // ==================== CONFIG ====================
            let SECTION_CONFIG = [
                {
                    id: "counter",
                    title: "Abstinenzzähler",
                    type: "counter",
                    visible: true,
                },
                {
                    id: "breathing",
                    title: "Boxatmung",
                    type: "breathing",
                    visible: true,
                },
                {
                    id: "ausloeser",
                    title: "Auslöser & Stressoren",
                    type: "default",
                    visible: true,
                },
                {
                    id: "gruende",
                    title: "Gute Gründe, abstinent zu bleiben",
                    type: "default",
                    visible: true,
                },
                {
                    id: "kontakte",
                    title: "Meine Notfallkontakte",
                    type: "contacts",
                    visible: true,
                },
                {
                    id: "skills",
                    title: "Bewältigungs-Mechanismen, Skills & Ablenkung",
                    type: "default",
                    visible: true,
                },
                {
                    id: "staerken",
                    title: "Meine Stärken",
                    type: "default",
                    visible: true,
                },
                {
                    id: "mottos",
                    title: "Hilfreiche Gedanken & Mottos",
                    type: "default",
                    visible: true,
                },
                {
                    id: "angenehmes",
                    title: "Angenehme Aktivitäten",
                    type: "default",
                    visible: true,
                },
            ];

            let DATA = {
                startDate: "",
                ausloeser: "",
                gruende: "",
                skills: "",
                staerken: "",
                mottos: "",
                angenehmes:
                    `* Spazieren gehen in der Natur\n` +
                    `* Heißes Bad oder Dusche\n` +
                    `* Lieblingsmusik hören\n` +
                    `* Mit dem Hund spielen\n` +
                    `* Gutes Buch lesen\n` +
                    `* Kaffee/Tee in Ruhe trinken\n` +
                    `* Serie oder Film schauen\n` +
                    `* Freunde/Familie anrufen\n` +
                    `* Sport machen oder Dehnen\n` +
                    `* Etwas Kreatives (Malen, Musik, etc.)`,
            };

            let KONTAKTE = [];
            let CUSTOM_SECTIONS = [];
            let selectedCustomIcon = "bolt";
            let currentlyEditing = null;

            const SVGs = {

            function formatBullets(text) {
                if (!text || typeof text !== "string") return "";

                const lines = text.trim().split("\n");
                let html = "";
                let inList = false;

                for (let line of lines) {
                    const trimmed = line.trim();

                    // Zeile ist ein Bullet-Point (- oder *)
                    if (/^[-*]\s+/.test(line)) {
                        const content = trimmed.replace(/^[-*]\s+/, "").trim();

                        if (!inList) {
                            html +=
                                '<ul style="margin: 12px 0 12px 8px; padding-left: 20px;">';
                            inList = true;
                        }

                        html += `<li style="margin-bottom: 6px; color: #e4e4e7;">${content}</li>`;
                    }
                    // Normale Zeile / Absatz
                    else {
                        if (inList) {
                            html += "</ul>";
                            inList = false;
                        }

                        if (trimmed === "") {
                            html += "<br>";
                        } else {
                            html += `<p style="margin: 10px 0;">${trimmed}</p>`;
                        }
                    }
                }

                // Liste am Ende schließen, falls offen
                if (inList) html += "</ul>";

                // Fallback: falls gar keine Listen erkannt wurden
                return html || text.replace(/\n/g, "<br>");
            }

            function saveToLocalStorage() {
                localStorage.setItem(
                    "notfallplan_config",
                    JSON.stringify(SECTION_CONFIG),
                );
                localStorage.setItem("notfallplan_data", JSON.stringify(DATA));
                localStorage.setItem(
                    "notfallplan_kontakte",
                    JSON.stringify(KONTAKTE),
                );
                localStorage.setItem(
                    "notfallplan_custom",
                    JSON.stringify(CUSTOM_SECTIONS),
                );
            }

            function loadFromLocalStorage() {
                if (localStorage.getItem("notfallplan_config"))
                    SECTION_CONFIG = JSON.parse(
                        localStorage.getItem("notfallplan_config"),
                    );
                if (localStorage.getItem("notfallplan_data"))
                    DATA = JSON.parse(localStorage.getItem("notfallplan_data"));
                if (localStorage.getItem("notfallplan_kontakte"))
                    KONTAKTE = JSON.parse(
                        localStorage.getItem("notfallplan_kontakte"),
                    );
                if (localStorage.getItem("notfallplan_custom"))
                    CUSTOM_SECTIONS = JSON.parse(
                        localStorage.getItem("notfallplan_custom"),
                    );
            }

            // ==================== RENDER MAIN CONTENT ====================
            function renderAllSections() {
                const container = document.getElementById("main-content");
                container.innerHTML = "";

                SECTION_CONFIG.forEach((config) => {
                    if (!config.visible) return;

                    if (config.type === "counter") {
                        return; // Nicht als Sektion rendern (wird separat im Header behandelt)
                    }

                    if (config.type === "breathing") {
                        container.innerHTML += `
                        <div class="breathing-section" id="breathing-section">
                            <button onclick="toggleBoxBreathing()" id="breathing-circle-btn" class="breathing-circle-btn">
                                <div id="breathing-circle" class="breathing-circle">
                                    <span id="breathing-icon" style="font-size: 2.8rem; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));">${SVGs.wind}</span>
                                </div>
                                <div id="breathing-btn-text" style="margin-top: 16px; font-weight: 600; font-size: 1.25rem; color: #34d399;">
                                </div>
                            </button>

                            <div id="breathing-text" style="margin-top: 28px; font-weight: 600; color:#34d399; font-size: 1.3rem;"></div>
                        </div>`;
                    } else if (config.type === "custom") {
                        const sec = CUSTOM_SECTIONS.find(
                            (s) => s.id === config.id,
                        );
                        if (sec) renderCustomSection(sec, container);
                    } else {
                        container.innerHTML += createDefaultSection(config);
                    }
                });

                setDefaultIcons();
                renderContacts();
                renderCounter();
                populateAllDisplays();
            }

            function renderCounter() {
                const wrapper = document.getElementById("counter-wrapper");
                const config = SECTION_CONFIG.find((s) => s.id === "counter");

                if (wrapper && config) {
                    wrapper.style.display = config.visible ? "block" : "none";
                }
            }

            function setDefaultIcons() {
                const iconMap = {
                    ausloeser: SVGs.bolt,
                    gruende: SVGs.heart,
                    kontakte: SVGs.phone,
                    skills: SVGs.toolbox,
                    staerken: SVGs.dumbbell,
                    mottos: SVGs.quote,
                    angenehmes: SVGs.toolbox,
                    gear: SVGs.gear,
                };

                Object.keys(iconMap).forEach((key) => {
                    const iconElement = document.getElementById(`icon-${key}`);
                    if (iconElement) {
                        iconElement.innerHTML = iconMap[key];
                    }
                });
            }

            function populateAllDisplays() {
                // Standard-Sektionen
                [
                    "ausloeser",
                    "gruende",
                    "skills",
                    "staerken",
                    "mottos",
                    "angenehmes",
                ].forEach((key) => {
                    const display = document.getElementById(key + "-display");
                    if (display) {
                        display.innerHTML = formatBullets(DATA[key] || "");
                    }
                });

                // Custom Sections
                CUSTOM_SECTIONS.forEach((section) => {
                    const display = document.getElementById(
                        `display-${section.id}`,
                    );
                    if (display) {
                        display.innerHTML = formatBullets(
                            section.content || "",
                        );
                    }
                });
            }

            function refreshAllContent() {
                // Default Felder
                [
                    "ausloeser",
                    "gruende",
                    "skills",
                    "staerken",
                    "mottos",
                    "angenehmes",
                ].forEach((key) => {
                    const display = document.getElementById(key + "-display");
                    if (display)
                        display.innerHTML = formatBullets(DATA[key] || "");
                });

                // Custom Sections
                CUSTOM_SECTIONS.forEach((section) => {
                    const display = document.getElementById(
                        `display-${section.id}`,
                    );
                    if (display)
                        display.innerHTML = formatBullets(
                            section.content || "",
                        );
                });

                renderContacts();
            }

            function createDefaultSection(config) {
                const key = config.id;

                if (key === "kontakte") {
                    return `
                    <div class="section" id="section-kontakte">
                        <div class="section-header">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <span id="icon-kontakte">${SVGs.phone}</span>
                                <span>${config.title}</span>
                            </div>
                            <button class="edit-btn" onclick="showAddContactModal()">+</button>
                        </div>
                        <div class="section-content" id="kontakte-list"></div>
                    </div>`;
                }

                // Special case for "Angenehmes" - collapsible + new modal editor
                if (key === "angenehmes") {
                    return `
                    <div class="section collapsible-section" id="section-${key}">
                        <div class="section-header" onclick="toggleCollapse('${key}')">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <span id="icon-${key}"></span>
                                <span>${config.title}</span>

                            <div style="display:flex; align-items:center; gap:8px;">
                                <button class="edit-btn" onclick="event.stopImmediatePropagation(); openEditor('${key}')">
                                    ✎
                                </button>
                                <span class="collapse-icon" data-target="${key}">›</span>
                            </div>
                        </div>
                        <div class="section-content collapsible-content" id="content-${key}" style="display:none;">
                            <div id="${key}-display" class="content-display"></div>
                        </div>
                    </div>`;
                }

                // All other default sections (non-collapsible)
                return `
                <div class="section" id="section-${key}">
                    <div class="section-header">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span id="icon-${key}"></span>
                            <span>${config.title}</span>
                        </div>
                        <button class="edit-btn" onclick="openEditor('${key}')">✎</button>
                    </div>
                    <div class="section-content">
                        <div id="${key}-display" class="content-display"></div>
                    </div>

            function renderCustomSection(section, container) {
                const iconSVG = SVGs[section.icon] || SVGs.bolt;
                let html = `<div class="section custom-section ${section.isCollapsible ? "collapsible-section" : ""}" id="section-${section.id}">`;

                if (section.isCollapsible) {
                    html += `
                    <div class="section-header" onclick="toggleCustomCollapse('${section.id}')">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span>${iconSVG}</span>
                            <span>${section.title}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:8px;">
                            <button class="edit-btn" onclick="openEditor('${section.id}', true)">✎</button>
                            <button class="edit-btn" style="background:#ef4444;" onclick="event.stopImmediatePropagation(); deleteCustomSection('${section.id}')">🗑</button>
                            <span id="collapse-icon-${section.id}" class="collapse-icon">›</span>
                        </div>
                    </div>
                    <div class="section-content" id="content-${section.id}" style="display:none;">
                        <div id="display-${section.id}" class="content-display">${formatBullets(section.content)}</div>
                        <textarea id="edit-${section.id}" style="display:none;"></textarea>
                    </div>`;
                } else {
                    html += `
                    <div class="section-header">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <span>${iconSVG}</span>
                            <span>${section.title}</span>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button class="edit-btn" onclick="openEditor('${section.id}', true)">✎</button>
                            <button class="edit-btn" style="background:#ef4444;" onclick="deleteCustomSection('${section.id}')">🗑</button>
                        </div>
                    </div>
                    <div class="section-content">
                        <div id="display-${section.id}" class="content-display">${formatBullets(section.content)}</div>
                        <textarea id="edit-${section.id}" style="display:none;"></textarea>
                    </div>`;
                }
                html += `</div>`;
                container.innerHTML += html;
            }

            function renderContacts() {
                const container = document.getElementById("kontakte-list");
                if (!container) return;
                container.innerHTML = "";

                if (KONTAKTE.length === 0) {
                    container.innerHTML = `<p style="color:#888; text-align:center; padding:40px 20px;">Noch keine Notfallkontakte hinzugefügt.</p>`;
                } else {
                    KONTAKTE.forEach((k, i) => {
                        const div = document.createElement("div");
                        div.className = "contact-item";
                        div.draggable = true;
                        div.dataset.index = i;

                        div.innerHTML = `
                            <div style="display:flex; align-items:center; gap:12px; flex:1; cursor:grab;">
                                <span style="color:#52525b; font-size:1.1rem;">☰</span>
                                <div>
                                    <div style="font-weight:500;">${k.name}</div>
                                    <a href="tel:${k.tel}" style="color:#34d399;">${k.tel}</a>
                                </div>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <a href="tel:${k.tel}" class="contact-call-btn">${SVGs.phone}</a>
                                <button onclick="deleteContact(${i}); event.stopImmediatePropagation()"
                                    style="background:#ef4444;color:white;border:none;width:44px;height:44px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;">🗑</button>
                            </div>`;

                        // Drag & Drop Events
                        div.addEventListener(
                            "dragstart",
                            handleContactDragStart,
                        );
                        div.addEventListener("dragover", handleContactDragOver);
                        div.addEventListener("drop", handleContactDrop);
                        div.addEventListener("dragend", handleContactDragEnd);

                        container.appendChild(div);
                    });
                }

                // Add Button
                const addBtn = document.createElement("button");
                addBtn.className = "add-contact";
                addBtn.textContent = "+ Neuen Kontakt hinzufügen";
                addBtn.onclick = showAddContactModal;
                container.appendChild(addBtn);
            }

            // ==================== CONTACT REORDERING ====================
            let draggedContactIndex = null;

            function handleContactDragStart(e) {
                draggedContactIndex = parseInt(e.currentTarget.dataset.index);
                e.currentTarget.style.opacity = "0.4";
                e.dataTransfer.effectAllowed = "move";
            }

            function handleContactDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";

                const items = document.querySelectorAll(".contact-item");
                items.forEach((item) => {
                    item.style.borderTop = "";
                    item.style.borderBottom = "";
                });

                const target = e.currentTarget;
                const rect = target.getBoundingClientRect();
                const midpoint = rect.top + rect.height / 2;

                if (e.clientY < midpoint) {
                    target.style.borderTop = "3px solid #34d399";
                } else {
                    target.style.borderBottom = "3px solid #34d399";
                }
            }

            function handleContactDrop(e) {
                e.preventDefault();
                const targetIndex = parseInt(e.currentTarget.dataset.index);
                if (
                    draggedContactIndex === null ||
                    draggedContactIndex === targetIndex
                )
                    return;

                const rect = e.currentTarget.getBoundingClientRect();
                let dropIndex = targetIndex;
                if (e.clientY > rect.top + rect.height / 2) dropIndex++;

                // Reorder array
                const [moved] = KONTAKTE.splice(draggedContactIndex, 1);
                if (draggedContactIndex < dropIndex) dropIndex--;
                KONTAKTE.splice(dropIndex, 0, moved);

                saveToLocalStorage();
                renderContacts(); // refresh
            }

            function handleContactDragEnd(e) {
                e.currentTarget.style.opacity = "1";
                document.querySelectorAll(".contact-item").forEach((item) => {
                    item.style.borderTop = "";
                    item.style.borderBottom = "";
                });
            }

            // ==================== MANAGE MODAL ====================
            function showManageModal() {
                const list = document.getElementById("manage-list");
                list.innerHTML = "";

                SECTION_CONFIG.forEach((item, index) => {
                    const div = document.createElement("div");
                    div.className = "section-manage-item";
                    div.draggable = false; // default off

                    // === Special handling for counter ===
                    if (item.id === "counter") {
                        div.innerHTML = `
                            <input type="checkbox" ${item.visible ? "checked" : ""}
                                   onchange="toggleVisibility('${item.id}', this.checked)">
                            <div style="flex:1; font-weight:500; color:#34d399;">
                                ${item.title} <span style="font-size:0.8rem; color:#888;">(fest im Header)</span>
                            </div>
                        `;
                        // Visual hint that it can't be moved
                        div.style.opacity = "0.85";
                        div.style.cursor = "default";
                    }
                    // Normal sections
                    else {
                        div.draggable = true;
                        div.dataset.index = index;

                        div.innerHTML = `
                            <input type="checkbox" ${item.visible ? "checked" : ""}
                                   onchange="toggleVisibility('${item.id}', this.checked)">
                            <div style="flex:1; font-weight:500;">${item.title}</div>

                            <button onclick="moveSection(${index}, -1)" style="min-width:36px;height:36px;background:#3f3f46;border:none;border-radius:8px;color:white;">↑</button>
                            <button onclick="moveSection(${index}, 1)" style="min-width:36px;height:36px;background:#3f3f46;border:none;border-radius:8px;color:white;">↓</button>
                        `;

                        if (item.type === "custom") {
                            div.innerHTML += `<button onclick="deleteCustomSection('${item.id}')" style="background:#ef4444;color:white;border:none;border-radius:8px;padding:0 10px;">🗑</button>`;
                        }

                        // Drag & Drop only for normal items
                        div.addEventListener("dragstart", handleDragStart);
                        div.addEventListener("dragover", handleDragOver);
                        div.addEventListener("drop", handleDrop);
                        div.addEventListener("dragend", handleDragEnd);
                    }

                    list.appendChild(div);
                });

            let draggedIndex = null;

            function handleDragStart(e) {
                draggedIndex = parseInt(e.currentTarget.dataset.index);
                e.currentTarget.style.opacity = "0.4";
                e.dataTransfer.effectAllowed = "move";
            }

            function handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";

                // Clear ALL highlights first
                document
                    .querySelectorAll(".section-manage-item")
                    .forEach((item) => {
                        item.style.borderTop = "";
                        item.style.borderBottom = "";
                    });

                const target = e.currentTarget;
                const targetIndex = parseInt(target.dataset.index);

                if (targetIndex === draggedIndex) return;

                // Better visual feedback: show border on top or bottom depending on mouse position
                const rect = target.getBoundingClientRect();
                const midpoint = rect.top + rect.height / 2;

                if (e.clientY < midpoint) {
                    target.style.borderTop = "3px solid #34d399";
                } else {
                    target.style.borderBottom = "3px solid #34d399";
                }
            }

            function handleDragEnd(e) {
                e.currentTarget.style.opacity = "1";

                // Clear all highlights
                document
                    .querySelectorAll(".section-manage-item")
                    .forEach((item) => {
                        item.style.borderTop = "";
                        item.style.borderBottom = "";
                    });
            }

            function handleDrop(e) {
                e.preventDefault();

                const targetIndex = parseInt(e.currentTarget.dataset.index);
                if (draggedIndex === null || draggedIndex === targetIndex)
                    return;

                const rect = e.currentTarget.getBoundingClientRect();
                const midpoint = rect.top + rect.height / 2;

                let dropIndex = targetIndex;

                // Adjust insertion point based on mouse position
                if (e.clientY > midpoint) {
                    dropIndex = targetIndex + 1;
                }

                // Reorder array
                const [movedItem] = SECTION_CONFIG.splice(draggedIndex, 1);

                // If dragging downwards, adjust index after splice
                if (draggedIndex < dropIndex) dropIndex--;

                SECTION_CONFIG.splice(dropIndex, 0, movedItem);

                // Refresh modal
                showManageModal();
            }

            function calculateDays() {
                if (!DATA.startDate) {
                    document.getElementById("days-count").textContent = "0";
                    return;
                }

                // Parse start date (YYYY-MM-DD) as Berlin midnight
                const start = new Date(DATA.startDate + "T00:00:00"); // Local parse

                // Get current Berlin time
                const now = new Date();

                // Simple but effective Berlin adjustment (handles CET/CEST)
                const berlinOffset = getBerlinOffset(now);
                const berlinNow = new Date(now.getTime() + berlinOffset);

                // Normalize both to midnight
                start.setHours(0, 0, 0, 0);
                berlinNow.setHours(0, 0, 0, 0);

                const diffTime = berlinNow - start;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                document.getElementById("days-count").textContent = Math.max(
                    0,
                    diffDays,
                );
            }

            // Helper for Berlin timezone (CET/CEST)
            function getBerlinOffset(date) {
                // Very reliable approximation for Germany
                const year = date.getFullYear();
                // CEST (UTC+2) from last Sunday March to last Sunday October
                const marchLastSunday = new Date(
                    year,
                    2,
                    31 - (new Date(year, 3, 0).getDay() || 7) + 1,
                );
                const octLastSunday = new Date(
                    year,
                    9,
                    31 - (new Date(year, 10, 0).getDay() || 7) + 1,
                );

                const isSummerTime =
                    date >= marchLastSunday && date < octLastSunday;
                return (isSummerTime ? 2 : 1) * 60 * 60 * 1000; // ms offset from UTC
            }

                if (val) {

            }

                content.classList.add("modal-content");

            // ==================== INIT ====================
            window.onload = function () {
                loadFromLocalStorage();
                renderAllSections();
                renderCounter();
                renderContacts();
                populateAllDisplays();

                // Icons für Default-Sektionen
                const icons = {
                    ausloeser: "bolt",
                    gruende: "heart",
                    kontakte: "phone",
                    skills: "toolbox",
                    staerken: "dumbbell",
                    mottos: "quote",
                    angenehmes: "toolbox",
                };
                Object.keys(icons).forEach((key) => {
                    const el = document.getElementById("icon-" + key);
                    if (el) el.innerHTML = SVGs[icons[key]];
                });

                calculateDays();
            };
        </script>
